<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Green Campus{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
    <div class="leaf-rails" aria-hidden="true">
        <div class="leaf-rail leaf-rail--left">
            <div class="leaf-stream" data-leaf-stream="left"></div>
        </div>
        <div class="leaf-rail leaf-rail--right">
            <div class="leaf-stream" data-leaf-stream="right"></div>
        </div>
    </div>

    <div class="page-shell">
        <header class="topbar">
            <a class="brand" href="{{ url_for('dashboard') }}">
                <span class="brand-mark">GC</span>
                <span>
                    <strong>Green Campus</strong>
                    <small>Sustainable operations dashboard</small>
                </span>
            </a>
            <nav class="topbar-nav">
                <a
                    class="topbar-nav__link{% if request.endpoint in ['dashboard', 'building'] %} is-active{% endif %}"
                    href="{{ url_for('dashboard') }}"
                >
                    Dashboard
                </a>
                <a
                    class="topbar-nav__link{% if request.endpoint in ['feedback', 'feedback_submit'] %} is-active{% endif %}"
                    href="{{ url_for('feedback') }}"
                >
                    Suggestions
                </a>
            </nav>
        </header>

        <main class="content-shell">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/effects.js') }}"></script>
    <script src="{{ url_for('static', filename='js/hourly_refresh.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
